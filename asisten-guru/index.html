<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#101c13" />
    <meta
      name="description"
      content="ClassMind - asisten mengajar berbasis AI untuk guru Indonesia: siapkan modul ajar, soal, LKPD, dan lainnya sesuai Kurikulum Merdeka."
    />
    <title>ClassMind - Asisten Mengajar untuk Guru</title>
    <!-- Tema dipasang SEBELUM paint. Sengaja inline & sinkron: kalau menunggu
         React, pengguna melihat kedip gelap→terang tiap reload. Gelap = tanpa
         atribut (:root sudah gelap). Kunci harus sama dgn THEME_KEY di
         src/lib/theme.ts. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('akhid-theme') === 'light') {
            document.documentElement.dataset.theme = 'light';
          }
        } catch (e) {
          /* storage diblokir → pakai default (gelap) */
        }
      })();
    </script>
    <!-- Konsol mobile (eruda) untuk debug: dimuat ASINKRON agar tidak memblokir
         boot. Tag <script> sinkron sebelumnya bisa menahan seluruh boot menunggu
         timeout CDN di jaringan HP lambat/putus. Kini app boot dulu; eruda
         menyusul saat CDN siap, diabaikan bila gagal. -->
    <script>
      (function () {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/eruda';
        s.async = true;
        s.onload = function () {
          try {
            eruda.init();
          } catch (e) {
            /* abaikan bila init gagal */
          }
        };
        document.head.appendChild(s);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
